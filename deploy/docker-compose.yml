x-edge-service: &edge-defaults
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  restart: unless-stopped
  networks:
    - hbot-net
  dns:
    - 8.8.8.8
    - 1.1.1.1
  logging:
    driver: "json-file"
    options:
      max-size: "5m"
      max-file: "3"
  deploy:
    resources:
      limits:
        memory: 128M

services:
  emqx:
    container_name: hbot-broker
    image: emqx:5
    restart: unless-stopped
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=node1.emqx.local
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.local]
      - EMQX_LOADED_PLUGINS="emqx_recon,emqx_retainer,emqx_management,emqx_dashboard"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - emqx-etc:/opt/emqx/etc
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    networks:
      hbot-net:
        aliases:
          - node1.emqx.local
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 10s
      timeout: 25s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    container_name: hbot-postgres
    profiles: ["api-extended"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hummingbot_api
      POSTGRES_USER: ${POSTGRES_USER:-hbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hummingbot-api}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hbot-net
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hbot} -d hummingbot_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  hummingbot-api:
    container_name: hbot-api
    profiles: ["api-extended"]
    build:
      context: ../hummingbot-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - api-bots:/hummingbot-api/bots
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      BROKER_HOST: emqx
      BROKER_PORT: "1883"
      BROKER_USERNAME: ${MQTT_USERNAME:-admin}
      BROKER_PASSWORD: ${MQTT_PASSWORD:-password}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hbot}:${POSTGRES_PASSWORD:-hummingbot-api}@postgres:5432/hummingbot_api
      GATEWAY_URL: http://gateway:15888
      CONFIG_PASSWORD: ${CONFIG_PASSWORD:-admin}
      USERNAME: ${API_USERNAME:-admin}
      PASSWORD: ${API_PASSWORD:-admin}
    networks:
      - hbot-net
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:8000/")''',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  hummingbot:
    container_name: hbot-client
    image: hummingbot/hummingbot:latest
    volumes:
      - hbot-conf:/home/hummingbot/conf
      - hbot-logs:/home/hummingbot/logs
      - hbot-data:/home/hummingbot/data
      - hbot-certs:/home/hummingbot/certs
      - hbot-scripts:/home/hummingbot/scripts
      - hbot-controllers:/home/hummingbot/controllers
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    tty: true
    stdin_open: true
    networks:
      - hbot-net
    depends_on:
      emqx:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  gateway:
    container_name: hbot-gateway
    image: hummingbot/gateway:latest
    restart: always
    ports:
      - "15888:15888"
    volumes:
      - gw-conf:/home/gateway/conf
      - gw-logs:/home/gateway/logs
      - hbot-certs:/home/gateway/certs
    environment:
      GATEWAY_PASSPHRASE: ${GATEWAY_PASSPHRASE:-admin}
      DEV: "true"
    networks:
      - hbot-net
    depends_on:
      - hummingbot
    deploy:
      resources:
        limits:
          memory: 256M

  edge-session:
    <<: *edge-defaults
    container_name: edge-session
    environment:
      SERVICE_NAME: session
      SESSION_MQTT_HOST: emqx
      SESSION_MQTT_PORT: "1883"
      SESSION_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      SESSION_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      SESSION_TARGET_PAIR: ${SESSION_TARGET_PAIR:-sol_usdc}
      SESSION_POLL_INTERVAL_SECONDS: ${SESSION_POLL_INTERVAL_SECONDS:-60}
    depends_on:
      emqx:
        condition: service_healthy

  edge-alpha:
    <<: *edge-defaults
    container_name: edge-alpha
    environment:
      SERVICE_NAME: alpha
      ALPHA_MQTT_HOST: emqx
      ALPHA_MQTT_PORT: "1883"
      ALPHA_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      ALPHA_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      ALPHA_MIN_SCORE: ${ALPHA_MIN_SCORE:-7}
      ALPHA_MIN_LIQUIDITY: ${ALPHA_MIN_LIQUIDITY:-50000}
      ALPHA_POLL_INTERVAL_SECONDS: ${ALPHA_POLL_INTERVAL_SECONDS:-900}
    depends_on:
      emqx:
        condition: service_healthy

  edge-arb:
    <<: *edge-defaults
    container_name: edge-arb
    environment:
      SERVICE_NAME: arb
      ARB_MQTT_HOST: emqx
      ARB_MQTT_PORT: "1883"
      ARB_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      ARB_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      ARB_MIN_ARB_PCT: ${ARB_MIN_ARB_PCT:-0.5}
      ARB_MIN_LIQUIDITY: ${ARB_MIN_LIQUIDITY:-5000}
    depends_on:
      emqx:
        condition: service_healthy

  edge-narrative:
    <<: *edge-defaults
    container_name: edge-narrative
    environment:
      SERVICE_NAME: narrative
      NARR_MQTT_HOST: emqx
      NARR_MQTT_PORT: "1883"
      NARR_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      NARR_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      NARR_MIN_VOLUME_SPIKE: ${NARR_MIN_VOLUME_SPIKE:-2.0}
      NARR_MIN_VOLUME_24H: ${NARR_MIN_VOLUME_24H:-50000}
    depends_on:
      emqx:
        condition: service_healthy

  edge-rewards:
    <<: *edge-defaults
    container_name: edge-rewards
    environment:
      SERVICE_NAME: rewards
      REWARDS_MQTT_HOST: emqx
      REWARDS_MQTT_PORT: "1883"
      REWARDS_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      REWARDS_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      REWARDS_MIN_EFFECTIVE_APR: ${REWARDS_MIN_EFFECTIVE_APR:-20}
      REWARDS_MAX_RISK_SCORE: ${REWARDS_MAX_RISK_SCORE:-8}
    depends_on:
      emqx:
        condition: service_healthy

  edge-inventory:
    <<: *edge-defaults
    container_name: edge-inventory
    profiles: ["api-extended"]
    environment:
      SERVICE_NAME: inventory
      INV_MQTT_HOST: emqx
      INV_MQTT_PORT: "1883"
      INV_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      INV_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      INV_TARGET_PAIR: ${INV_TARGET_PAIR:-sol_usdc}
      INV_API_BASE_URL: http://hummingbot-api:8000
      INV_API_USERNAME: ${API_USERNAME:-admin}
      INV_API_PASSWORD: ${API_PASSWORD:-admin}
    depends_on:
      emqx:
        condition: service_healthy
      hummingbot-api:
        condition: service_healthy

  edge-hedge:
    <<: *edge-defaults
    container_name: edge-hedge
    profiles: ["api-extended"]
    environment:
      SERVICE_NAME: hedge
      HEDGE_MQTT_HOST: emqx
      HEDGE_MQTT_PORT: "1883"
      HEDGE_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      HEDGE_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      HEDGE_TARGET_PAIR: ${HEDGE_TARGET_PAIR:-sol_usdc}
      HEDGE_DELTA_THRESHOLD: ${HEDGE_DELTA_THRESHOLD:-0.5}
      HEDGE_API_BASE_URL: http://hummingbot-api:8000
      HEDGE_API_USERNAME: ${API_USERNAME:-admin}
      HEDGE_API_PASSWORD: ${API_PASSWORD:-admin}
    depends_on:
      emqx:
        condition: service_healthy
      hummingbot-api:
        condition: service_healthy

  edge-pnl:
    <<: *edge-defaults
    container_name: edge-pnl
    profiles: ["api-extended"]
    environment:
      SERVICE_NAME: pnl
      PNL_MQTT_HOST: emqx
      PNL_MQTT_PORT: "1883"
      PNL_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      PNL_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      PNL_TARGET_PAIR: ${PNL_TARGET_PAIR:-sol_usdc}
      PNL_POLL_INTERVAL_SECONDS: ${PNL_POLL_INTERVAL_SECONDS:-300}
      PNL_API_BASE_URL: http://hummingbot-api:8000
      PNL_API_USERNAME: ${API_USERNAME:-admin}
      PNL_API_PASSWORD: ${API_PASSWORD:-admin}
    depends_on:
      emqx:
        condition: service_healthy
      hummingbot-api:
        condition: service_started

  edge-alert:
    <<: *edge-defaults
    container_name: edge-alert
    environment:
      SERVICE_NAME: alert
      ALERT_MQTT_HOST: emqx
      ALERT_MQTT_PORT: "1883"
      ALERT_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      ALERT_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
    depends_on:
      emqx:
        condition: service_healthy

  edge-clmm:
    <<: *edge-defaults
    container_name: edge-clmm
    environment:
      SERVICE_NAME: clmm
      CLMM_MQTT_HOST: emqx
      CLMM_MQTT_PORT: "1883"
      CLMM_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      CLMM_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      CLMM_TARGET_PAIR: ${CLMM_TARGET_PAIR:-sol_usdc}
      CLMM_BASE_RANGE_PCT: ${CLMM_BASE_RANGE_PCT:-2.0}
      CLMM_REBALANCE_THRESHOLD_PCT: ${CLMM_REBALANCE_THRESHOLD_PCT:-70}
    depends_on:
      emqx:
        condition: service_healthy

  edge-watchlist:
    <<: *edge-defaults
    container_name: edge-watchlist
    environment:
      SERVICE_NAME: watchlist
      WL_MQTT_HOST: emqx
      WL_MQTT_PORT: "1883"
      WL_MQTT_USERNAME: ${MQTT_USERNAME:-admin}
      WL_MQTT_PASSWORD: ${MQTT_PASSWORD:-password}
      WL_EVAL_INTERVAL_SECONDS: ${WL_EVAL_INTERVAL_SECONDS:-300}
      WL_MAX_ARB_TOKENS: ${WL_MAX_ARB_TOKENS:-40}
      WL_MAX_REWARDS_POOLS: ${WL_MAX_REWARDS_POOLS:-20}
      WL_MAX_FUNDING_SYMBOLS: ${WL_MAX_FUNDING_SYMBOLS:-20}
    depends_on:
      emqx:
        condition: service_healthy

networks:
  hbot-net:
    driver: bridge

volumes:
  emqx-data:
  emqx-log:
  emqx-etc:
  postgres-data:
  api-bots:
  hbot-conf:
  hbot-logs:
  hbot-data:
  hbot-certs:
  hbot-scripts:
  hbot-controllers:
  gw-conf:
  gw-logs:
